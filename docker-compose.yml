services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: lms-backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: file:./prisma/database/leave.db

    volumes:
      - sqlite-data:/app/prisma/database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: lms-frontend

    restart: unless-stopped

    ports:
      - "5173:80"

    depends_on:
      - backend

volumes:
  sqlite-data: